<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل | Traveliun</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0c4a6e 0%, #164e63 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      color: white;
      max-width: 500px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f59e0b;
      color: #1f2937;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn:hover {
      background: #fbbf24;
      transform: scale(1.05);
    }
    
    .tips {
      margin-top: 48px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      text-align: right;
    }
    
    .tips h3 {
      font-size: 1rem;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .tips ul {
      list-style: none;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    .tips li {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .tips li::before {
      content: "✓";
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✈️</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      يبدو أنك فقدت الاتصال بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 إعادة المحاولة
    </button>
    
    <div class="tips">
      <h3>💡 نصائح للاتصال:</h3>
      <ul>
        <li>تحقق من اتصال WiFi أو البيانات</li>
        <li>أعد تشغيل المتصفح</li>
        <li>جرب فتح صفحة أخرى</li>
      </ul>
    </div>
  </div>
  
  <script>
    // التحقق من الاتصال تلقائياً
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
